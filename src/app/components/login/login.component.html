<app-navbar></app-navbar>

<div class="wraper">
  <div class="body">
    <div>
      <h1 class="mt-3 mb-3">Bienvenido</h1>
      <h6 class="mt-3 mb-3">Iniciar Sesión</h6>
    </div>

    <div class="form-floating mb-3">
      <input type="email" class="form-control" id="email" [(ngModel)]="email" placeholder="name@example.com" (change)="markAsDirty()">
      <label for="email">Correo Electrónico</label>
    </div>

    <div class="form-floating mb-3">
      <input type="password" class="form-control" id="password" [(ngModel)]="password" placeholder="Password">
      <label for="password">Contraseña</label>
    </div>

    <div class="mb-3 d-flex justify-content-center">
      <re-captcha
        (resolved)="resolved($event)"
        (errorCallback)="onError($event)">
      </re-captcha>
    </div>

    <div class="d-grid gap-2 mt-3">
      <button
        class="btn btn-primary"
        type="button"
        (click)="login()"
        [disabled]="!recaptchaToken || loading">
        Entrar
      </button>
    </div>

    <p class="mt-3">No tengo cuenta <a href="/singIn">Registrarme</a></p>
    <p class="mt-3"><a href="/forgotPassword">Olvidé mi contraseña</a></p>

    <div><p id="alert" [innerHTML]="alertTexto" class="text-danger"></p></div>
    <app-spinner *ngIf="loading"></app-spinner>
  </div>
</div>
