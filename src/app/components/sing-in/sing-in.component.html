<app-navbar></app-navbar>
<div class="wraper">
  <div class="body">

  <div action="" >
<div class="mt-3 mb-3"><h2>Registrarse</h2></div>

  <div class="form-floating mt-3 col">
  <input type="text" class="form-control" [(ngModel)]="name"  id="name" placeholder="" >
  <label for="name">Nombre</label>
  </div>
  <div class="form-floating mt-3 col">
  <input type="text" class="form-control" [(ngModel)]="lastname" id="lastname" placeholder="">
  <label for="lastname">Apellido</label>
  </div>
  </div>
  <div class="form-floating mt-3">
  <input type="email" class="form-control" id="email" [(ngModel)]="email" placeholder="">
  <label for="email">Correo Electronico</label>
  <br>


<div class="form-floating mb-3 position-relative">
  <input
    [type]="verPassword ? 'text' : 'password'"
    class="form-control"
    id="password"
    [(ngModel)]="password"
    placeholder="Password">
  <label for="password">Contraseña</label>

 <button
  type="button"
  class="btn position-absolute top-50 end-0 translate-middle-y me-2"
  (click)="verPassword = !verPassword"
  style="z-index: 10;">



</button>
</div>
<div class="form-floating mb-3 position-relative">
  <input
    [type]="verPassword ? 'text' : 'password'"
    class="form-control"
    id="password"
    [(ngModel)]="repeatpassword"
    placeholder="Password">
  <label for="password">Repite Contraseña</label>

 <button
  type="button"
  class="btn position-absolute top-50 end-0 translate-middle-y me-2"
  (click)="verPassword = !verPassword"
  style="z-index: 10;">

  <i *ngIf="verPassword" class="bi bi-eye-slash text-dark"></i>

  <i *ngIf="!verPassword" class="bi bi-eye text-dark"></i>

  <span class="ms-1" style="font-size: 0.8rem;">
    {{ verPassword ? 'Ocultar' : 'Ver' }}
  </span>
</button>
</div>

  <div class="d-grid gap-2 mt-3">
    </div>
  <button class="btn btn-primary" (click)="addUser()" type="button">Registrarme</button>




<p class="mt-3"> Ya tengo cuenta <a href="/logIn">Ingresar</a></p>

<div class="alert">
<p id="alertTexto" [innerHTML]="alertTexto"></p>
</div>
<app-spinner *ngIf="loading"></app-spinner>
  </div>
</div>
