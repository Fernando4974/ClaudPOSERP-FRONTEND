<app-navbar></app-navbar>

<div class="container-fluid mt-4">
  <div class="row g-4">

    <div class="col-12 col-md-3 col-lg-2">
      <app-sidebar></app-sidebar>
    </div>

    <div class="col-12 col-md-9 col-lg-10">

      <div class="card mb-3 border-0 shadow-sm">
        <div class="card-body p-2">
          <div class="input-group">
            <input
              type="text"
              class="form-control border-0 shadow-none"
              placeholder="Buscar por nombre o descripción..."
              [(ngModel)]="filterTerm"
              (input)="search()"
            >
            <span class="input-group-text bg-white border-0" id="search-addon">🔍</span>
          </div>
        </div>
      </div>

      <div *ngIf="spinnerVisible" class="text-center my-5">
        <app-spinner></app-spinner>
        <p class="text-muted mt-2">Cargando Productos...</p>
      </div>

      <div *ngIf="!spinnerVisible && filteredSales.length === 0 && filterTerm" class="alert alert-warning shadow-sm">
        No se encontraron productos que coincidan con "<strong>{{filterTerm}}</strong>"
      </div>

      <div class="card shadow-sm" *ngIf="filteredSales.length > 0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>ID</th>

                <th>Estado</th>
                     <th>Fecha</th>
                 <th>Total</th>

                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of filteredSales">
                <td><span class="text-primary fw-bold">#{{item.id.substring(0,8)}}</span></td>
                 <td>
                  <span class="badge rounded-pill bg-info text-dark">{{item.status}}</span>
                </td>
                   <td>
                  <span class="text-dark">{{item.createdAt | date:'short'}}</span>
                </td>
                <td class="fw-semibold">${{item.total | number:'1.2-2'}}</td>


                <td class="text-end">
                  <button (click)="editSale(item.id)" class="btn btn-light btn-sm border" title="Editar">
                    <img src="ajustes.png" alt="edit" style="width: 16px;">
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
