<app-navbar></app-navbar>

<body>
  <div class="container listProduct">
    <app-sidebar></app-sidebar>

    <div>
      <div class="control-content">
        <div class="new-button">
          <button class="btn btn-success mt-3" (click)="goToNewProduct()">Nuevo</button>
        </div>

        <div class="input-group flex-nowrap mt-3">
          <input
            type="text"
            class="form-control"
            placeholder="Buscar por nombre o descripción..."
            aria-label="Username"
            aria-describedby="addon-wrapping"
            [(ngModel)]="filterTerm"
            (input)="search()"
          >
        </div>

        &nbsp;

      </div>

      <div>
        <div *ngIf="filteredProducts.length === 0" class="alert alert-light mt-2">
          No se encontraron productos que coincidan con "{{filterTerm}}"
        </div>
        <div *ngIf="listProduct==[]" class="alert alert-light mt-2">
         Cargando Productos...
        </div>
      </div>

      <table class="table">
        <thead>
          <tr>
            <th scope="col">Name</th>
            <th scope="col">Description</th>
            <th scope="col">Price</th>
            <th scope="col"></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of filteredProducts">
            <td>{{item.title}}</td>
            <td>{{item.description}}</td>
            <td>$ {{item.price}}</td>
            <td>
              <button (click)="editProduct(item.id)" class="btn btn-warning" title="editar">
                <img src="ajustes.png" alt="ico">
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
