<app-navbar></app-navbar>

<body>
  <div class="container listProduct">
    <app-sidebar></app-sidebar>

    <div>
      <div class="control-content">
        <div class="new-button">
          <button *appHasRole="'admin'" class="btn btn-success mt-3" (click)="goToNewProduct()">Nuevo</button>
        </div>

        <div class="input-group flex-nowrap mt-3">
          <input
            type="text"
            class="form-control"
            placeholder="Buscar por nombre o descripcion..."
            aria-label="Buscar producto"
            aria-describedby="search-addon"
            [(ngModel)]="filterTerm"
            (input)="search()"
          >
          <span class="input-group-text" id="search-addon">Buscar</span>
        </div>

        &nbsp;
      </div>

      <div>
        <div *ngIf="!spinner && filterTerm && filteredProducts.length === 0" class="alert alert-light mt-2">
          No se encontraron productos que coincidan con "{{ filterTerm }}"
        </div>
        <div *ngIf="!spinner && !filterTerm && listProduct.length === 0" class="alert alert-light mt-2">
          No hay productos para mostrar.
        </div>
      </div>

      <table class="table">
        <thead>
          <tr>
            <th scope="col">Imagen</th>
            <th scope="col">Nombre</th>
            <th scope="col">Descripcion</th>
            <th scope="col">Precio</th>
            <th scope="col">Tecla Rapida</th>
            <th scope="col"></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of filteredProducts; let i = index">
            <td>
              <img [src]="getImage(item)" (error)="onImageError($event)" [alt]="item.title" style="max-width:60px; max-height:40px; object-fit:cover;" />
            </td>
            <td>{{ item.title.slice(0,20) }}</td>
            <td>{{ item.description.slice(0, 15) }}...</td>
            <td>$ {{ item.price }}</td>
            <td>* {{ item.numberKey }}</td>
            <td>
              <button *appHasRole="'admin'" (click)="editProduct(item.id)" class="btn btn-warning" title="editar">
                <img src="ajustes.png" alt="ico">
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="d-flex flex-wrap justify-content-center align-items-center gap-2 mt-2">
        <!-- <div class="d-flex align-items-center gap-2">
          <label for="page-size" class="mb-0">Mostrar</label>
          <select
            id="page-size"
            class="form-select form-select-sm"
            style="width: auto;"
            [ngModel]="pagination.limit"
            (ngModelChange)="changePageSize($event)"
          >
            <option [ngValue]="8">8</option>


          </select>
          <span>por pagina</span>
        </div> -->

        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-outline-secondary btn-sm" (click)="previousPage()" [disabled]="!hasPreviousPage || spinner">
            Anterior
          </button>
          <span>Pagina {{ currentPage }}</span>
          <button class="btn btn-outline-secondary btn-sm" (click)="nextPage()" [disabled]="!hasNextPage || spinner">
            Siguiente
          </button>
        </div>
      </div>

      <app-spinner *ngIf="spinner"></app-spinner>
    </div>
  </div>
</body>
